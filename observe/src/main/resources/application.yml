server:
  port: 8080

spring:
  application:
    name: observe

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/observe}
    username: ${DB_USERNAME:observe_user}
    password: ${DB_PASSWORD:observe_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    org.hibernate.SQL: debug